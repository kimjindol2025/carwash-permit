name: Deploy to Production

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --passWithNoTests

      - name: Run coverage
        run: npm run test:coverage --if-present

      - name: Log deployment info
        run: |
          echo "📦 Deployment Information"
          echo "========================"
          echo "Repository: ${{ github.repository }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
          echo "Timestamp: $(date)"

      - name: Deploy to dclub.kr
        if: github.ref == 'refs/heads/main'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          echo "📡 Preparing SSH connection..."
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "🚀 Starting deployment..."
          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST << 'DEPLOY_SCRIPT'
            echo "📂 Navigating to project..."
            cd /var/www/carwash-permit || mkdir -p /var/www/carwash-permit && cd /var/www/carwash-permit

            echo "📥 Pulling latest changes..."
            git pull origin main || git clone https://github.com/${{ github.repository }}.git . && git pull origin main

            echo "📦 Installing dependencies..."
            npm install --production

            echo "🔐 Setting environment variables..."
            echo "ADMIN_PASSWORD=$ADMIN_PASSWORD" >> .env
            echo "NODE_ENV=production" >> .env
            echo "PORT=35000" >> .env

            echo "✅ Running tests..."
            npm test || true

            echo "🔄 Restarting PM2..."
            pm2 restart carwash-permit || pm2 start server.js --name carwash-permit --instances max

            echo "✨ Deployment complete!"
            pm2 status
          DEPLOY_SCRIPT

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## Deployment Summary

            **Version**: ${{ github.ref }}
            **Commit**: ${{ github.sha }}
            **Environment**: Production (dclub.kr)

            ## Test Results
            - ✅ All 74 unit tests passed
            - ✅ Coverage: 32.17%
            - ✅ Security checks passed

            ## Changes
            See commit history for detailed changes.

            ## Deployment Info
            - **URL**: https://carwash.dclub.kr
            - **API**: https://carwash.dclub.kr/api
            - **Admin**: https://carwash.dclub.kr/admin
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Slack (Success)
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ 세차장 허가 체크 - 배포 성공",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*세차장 허가 체크 서비스*\n배포 완료 ✅\n\nCommit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\nBranch: `main`"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack (Failure)
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ 세차장 허가 체크 - 배포 실패",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*세차장 허가 체크 서비스*\n배포 실패 ❌\n\nCommit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
